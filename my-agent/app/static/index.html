<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lore Vault Studio</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/chat.css">
    <link rel="stylesheet" href="/styles/graph.css">
</head>
<body>
    <div id="top-bar" style="height: 45px; background: var(--bg-color); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between;">
        <strong style="color: var(--text-color); font-size: 16px;">Lore Vault Studio</strong>
        <div class="view-toggles">
            <button id="toggle-chat-btn" style="opacity: 1;">Chat Panel</button>
            <button id="toggle-editor-btn" style="opacity: 1; margin-left: 5px;">Editor</button>
            <button id="toggle-explorer-btn" style="opacity: 1; margin-left: 5px;">Explorer</button>
        </div>
    </div>
    
    <div id="app-container" style="height: calc(100vh - 45px);">
        <!-- Left Panel: Chat -->
        <section id="chat-panel" style="width: 350px; flex: none; min-width: 250px;">
            <div id="chat-history">
                <div class="message system">Welcome to Lore Vault Studio. Describe an entity to draft it, or ask a question about the lore!</div>
            </div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="Type your query or instruction..." />
                <button id="send-btn">Send</button>
            </div>
            <div id="status-indicator">Status: Idle</div>
        </section>

        <div class="resizer" id="resizer-1"></div>

        <!-- Middle Panel: Editor -->
        <section id="editor-panel" style="flex: 1 1 auto; min-width: 300px;">
            <div id="editor-header">
                <h2>Entity Editor</h2>
                <div class="actions">
                    <button id="save-btn" disabled>Save to Vault</button>
                    <button id="discard-btn" disabled>Discard</button>
                </div>
            </div>
            <div id="editor-content">
                <p class="placeholder-text">Draft an entity to see form fields here...</p>
                <form id="dynamic-form"></form>
            </div>
        </section>

        <div class="resizer" id="resizer-2"></div>

        <!-- Right Panel: Graph & Explorer -->
        <section id="graph-panel" style="width: 450px; flex: none; min-width: 300px;">
            <div id="graph-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border);">
                <h2>Vault Explorer</h2>
                <div class="view-toggles" style="display: flex; gap: 5px;">
                    <button id="view-graph-btn" style="opacity: 1;">Graph</button>
                    <button id="view-list-btn" style="opacity: 0.5;">List</button>
                    <button id="pop-out-btn" style="margin-left: 10px;">⇱ Pop Out</button>
                    <button id="pull-in-btn" style="margin-left: 10px; display: none;">⇲ Pull In</button>
                </div>
            </div>
            
            <div id="graph-container" style="flex: 1; position: relative;">
                <p class="placeholder-text" style="padding: 20px; color: var(--text-muted);">Graph visualization pending Phase 5...</p>
            </div>
            
            <div id="list-container" style="display: none; flex: 1; flex-direction: column; padding: 20px;">
                <input type="text" id="list-search" placeholder="Search entities..." style="margin-bottom: 15px;" />
                <div id="list-items" style="flex: 1; overflow-y: auto;">
                    <!-- Items injected via JS -->
                </div>
            </div>
        </section>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/js/ui_renderer.js"></script>
    <script src="/js/ui_state.js"></script>
    <script src="/js/ui_graph.js"></script>
    <script src="/js/ui_layout.js"></script>
</body>
</html>
